---
# Deploy Trusted Software Factory using tsf CLI

# Ensure serviceAccountIssuer is set for TAS OIDC configuration
- name: Get cluster Authentication config
  kubernetes.core.k8s_info:
    api_version: config.openshift.io/v1
    kind: Authentication
    name: cluster
  register: r_authentication

- name: Set serviceAccountIssuer if empty
  when: r_authentication.resources[0].spec.serviceAccountIssuer | default('') == ''
  kubernetes.core.k8s:
    api_version: config.openshift.io/v1
    kind: Authentication
    name: cluster
    definition:
      spec:
        serviceAccountIssuer: "https://kubernetes.default.svc"
    state: patched

- name: Create TSF resources
  kubernetes.core.k8s:
    state: present
    template: "{{ item }}"
  loop:
    - namespace.yml.j2
    - serviceaccount.yml.j2
    - clusterrolebinding.yml.j2
    - pod.yml.j2

- name: Wait for TSF CLI pod to be ready
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    name: tsf-cli
    namespace: "{{ ocp4_workload_trusted_software_factory_namespace }}"
  register: r_tsf_pod
  retries: 30
  delay: 2
  until:
    - r_tsf_pod.resources | length > 0
    - r_tsf_pod.resources[0].status.phase is defined
    - r_tsf_pod.resources[0].status.phase == "Running"

# Create TSF configuration using tsf CLI
- name: Create TSF configuration via CLI
  kubernetes.core.k8s_exec:
    namespace: "{{ ocp4_workload_trusted_software_factory_namespace }}"
    pod: tsf-cli
    command: tsf config --create --force
  register: r_tsf_config_create

# Update cert-manager manageSubscription setting
- name: Update cert-manager manageSubscription in config
  when: not ocp4_workload_trusted_software_factory_manage_cert_manager_subscription
  block:
    - name: Get current TSF config
      kubernetes.core.k8s_info:
        api_version: v1
        kind: ConfigMap
        name: tsf-config
        namespace: "{{ ocp4_workload_trusted_software_factory_namespace }}"
      register: r_tsf_config

    - name: Parse current config
      ansible.builtin.set_fact:
        _tsf_config: "{{ r_tsf_config.resources[0].data['config.yaml'] | from_yaml }}"

    - name: Build updated products list
      ansible.builtin.set_fact:
        _updated_products: "{{ _updated_products | default([]) + [_product] }}"
      vars:
        _product: "{{ item | combine({'properties': {'manageSubscription': false}}, recursive=True) if item.name == 'Cert-Manager' else item }}"
      loop: "{{ _tsf_config.tsf.products }}"

    - name: Update Cert-Manager manageSubscription
      ansible.builtin.set_fact:
        _tsf_config_updated: "{{ _tsf_config | combine({'tsf': {'products': _updated_products}}, recursive=True) }}"

    - name: Update TSF configuration ConfigMap
      kubernetes.core.k8s:
        state: present
        template: tsf-config.yml.j2

# Configure GitLab integration
- name: Wait for GitLab initialization job to complete
  kubernetes.core.k8s_info:
    api_version: batch/v1
    kind: Job
    name: initialize-gitlab
    namespace: "{{ ocp4_workload_trusted_software_factory_gitlab_namespace }}"
  register: r_gitlab_init_job
  retries: 80
  delay: 15
  until:
    - r_gitlab_init_job.resources | length > 0
    - r_gitlab_init_job.resources[0].status is defined
    - r_gitlab_init_job.resources[0].status.conditions is defined
    - r_gitlab_init_job.resources[0].status.conditions | selectattr('type', 'equalto', 'Complete') | list | length > 0
    - (r_gitlab_init_job.resources[0].status.conditions | selectattr('type', 'equalto', 'Complete') | first).status == "True"

- name: Get GitLab route
  kubernetes.core.k8s_info:
    api_version: route.openshift.io/v1
    kind: Route
    name: gitlab
    namespace: "{{ ocp4_workload_trusted_software_factory_gitlab_namespace }}"
  register: r_gitlab_route

- name: Get GitLab root token from secret
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: root-user-personal-token
    namespace: "{{ ocp4_workload_trusted_software_factory_gitlab_namespace }}"
  register: r_gitlab_secret

- name: Configure GitLab integration via tsf CLI
  kubernetes.core.k8s_exec:
    namespace: "{{ ocp4_workload_trusted_software_factory_namespace }}"
    pod: tsf-cli
    command: >-
      tsf integration gitlab
      --host {{ r_gitlab_route.resources[0].spec.host }}
      --port 443
      --token {{ r_gitlab_secret.resources[0].data.token | b64decode }}
      --group {{ ocp4_workload_trusted_software_factory_gitlab_group }}

# Configure Quay integration
- name: Get Quay route
  kubernetes.core.k8s_info:
    api_version: route.openshift.io/v1
    kind: Route
    name: quay-quay
    namespace: "{{ ocp4_workload_trusted_software_factory_quay_namespace }}"
  register: r_quay_route

- name: Get Quay admin token from secret
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: quay-admin-token
    namespace: "{{ ocp4_workload_trusted_software_factory_quay_namespace }}"
  register: r_quay_secret

- name: Set Quay variables
  ansible.builtin.set_fact:
    _quay_host: "{{ r_quay_route.resources[0].spec.host }}"
    _quay_token: "{{ r_quay_secret.resources[0].data.token | b64decode }}"
    _quay_auth: "{{ (ocp4_workload_trusted_software_factory_quay_admin_username + ':' + (r_quay_secret.resources[0].data.token | b64decode)) | b64encode }}"

- name: Check if Quay organization exists
  ansible.builtin.uri:
    url: "https://{{ _quay_host }}/api/v1/organization/{{ ocp4_workload_trusted_software_factory_quay_organization }}"
    method: GET
    headers:
      Authorization: "Bearer {{ _quay_token }}"
    validate_certs: false
    status_code: [200, 404]
  register: r_quay_org_check

- name: Create Quay organization
  when: r_quay_org_check.status == 404
  ansible.builtin.uri:
    url: "https://{{ _quay_host }}/api/v1/organization/"
    method: POST
    headers:
      Authorization: "Bearer {{ _quay_token }}"
      Content-Type: application/json
    body_format: json
    body:
      name: "{{ ocp4_workload_trusted_software_factory_quay_organization }}"
      email: "{{ ocp4_workload_trusted_software_factory_quay_organization }}@demo.redhat.com"
    validate_certs: false
    status_code: [200, 201]
  register: r_quay_org_create

- name: Configure Quay integration via tsf CLI
  kubernetes.core.k8s_exec:
    namespace: "{{ ocp4_workload_trusted_software_factory_namespace }}"
    pod: tsf-cli
    command: >-
      tsf integration quay
      --url https://{{ _quay_host }}
      --token {{ _quay_token }}
      --organization {{ ocp4_workload_trusted_software_factory_quay_organization }}
      --force

# Deploy TSF using embedded installer charts
- name: Deploy TSF via tsf CLI
  kubernetes.core.k8s_exec:
    namespace: "{{ ocp4_workload_trusted_software_factory_namespace }}"
    pod: tsf-cli
    command: sh -c 'tsf deploy 2>&1 | tee /tmp/tsf-deploy.log'
  register: r_tsf_deploy

- name: Display TSF deployment output
  ansible.builtin.debug:
    var: r_tsf_deploy.stdout_lines
