---
# Configure Keycloak and OpenShift Authentication

- name: Get Keycloak route
  kubernetes.core.k8s_info:
    api_version: route.openshift.io/v1
    kind: Route
    name: keycloak
    namespace: "{{ ocp4_workload_trusted_software_factory_keycloak_namespace }}"
  register: r_keycloak_route

- name: Get Keycloak admin credentials
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: keycloak-initial-admin
    namespace: "{{ ocp4_workload_trusted_software_factory_keycloak_namespace }}"
  register: r_keycloak_admin_secret

- name: Set Keycloak admin credentials
  ansible.builtin.set_fact:
    _keycloak_admin_user: "{{ r_keycloak_admin_secret.resources[0].data.username | b64decode }}"
    _keycloak_admin_password: "{{ r_keycloak_admin_secret.resources[0].data.password | b64decode }}"
    _keycloak_url: "https://{{ r_keycloak_route.resources[0].spec.host }}"

- name: Get Keycloak admin token
  ansible.builtin.uri:
    url: "{{ _keycloak_url }}/realms/master/protocol/openid-connect/token"
    method: POST
    body_format: form-urlencoded
    body:
      username: "{{ _keycloak_admin_user }}"
      password: "{{ _keycloak_admin_password }}"
      grant_type: password
      client_id: admin-cli
    validate_certs: false
  register: r_keycloak_token

- name: Get TSF realm
  ansible.builtin.uri:
    url: "{{ _keycloak_url }}/admin/realms/{{ ocp4_workload_trusted_software_factory_keycloak_realm }}"
    method: GET
    headers:
      Authorization: "Bearer {{ r_keycloak_token.json.access_token }}"
    validate_certs: false
    status_code: [200, 404]
  register: r_tsf_realm

- name: Create admin user in TSF realm
  when: r_tsf_realm.status == 200
  block:
    - name: Check if admin user exists
      ansible.builtin.uri:
        url: "{{ _keycloak_url }}/admin/realms/{{ ocp4_workload_trusted_software_factory_keycloak_realm }}/users?username={{ ocp4_workload_trusted_software_factory_keycloak_admin_username }}"
        method: GET
        headers:
          Authorization: "Bearer {{ r_keycloak_token.json.access_token }}"
        validate_certs: false
      register: r_existing_user

    - name: Create admin user
      when: r_existing_user.json | length == 0
      ansible.builtin.uri:
        url: "{{ _keycloak_url }}/admin/realms/{{ ocp4_workload_trusted_software_factory_keycloak_realm }}/users"
        method: POST
        headers:
          Authorization: "Bearer {{ r_keycloak_token.json.access_token }}"
          Content-Type: application/json
        body_format: json
        body:
          username: "{{ ocp4_workload_trusted_software_factory_keycloak_admin_username }}"
          enabled: true
          emailVerified: true
          firstName: "Admin"
          lastName: "User"
          email: "{{ ocp4_workload_trusted_software_factory_keycloak_admin_email }}"
          credentials:
            - type: password
              value: "{{ ocp4_workload_trusted_software_factory_keycloak_admin_password }}"
              temporary: false
        validate_certs: false
        status_code: 201
      register: r_user_created

    - name: Get admin user ID
      ansible.builtin.uri:
        url: "{{ _keycloak_url }}/admin/realms/{{ ocp4_workload_trusted_software_factory_keycloak_realm }}/users?username={{ ocp4_workload_trusted_software_factory_keycloak_admin_username }}"
        method: GET
        headers:
          Authorization: "Bearer {{ r_keycloak_token.json.access_token }}"
        validate_certs: false
      register: r_admin_user

- name: Configure OpenShift OAuth client in Keycloak
  when: r_tsf_realm.status == 200
  block:
    - name: Set OAuth redirect URL
      ansible.builtin.set_fact:
        _oauth_redirect_url: "https://oauth-openshift.{{ openshift_cluster_ingress_domain }}/oauth2callback/keycloak"
        _oauth_web_origin: "https://oauth-openshift.{{ openshift_cluster_ingress_domain }}"

    - name: Check if OpenShift client exists
      ansible.builtin.uri:
        url: "{{ _keycloak_url }}/admin/realms/{{ ocp4_workload_trusted_software_factory_keycloak_realm }}/clients?clientId=openshift"
        method: GET
        headers:
          Authorization: "Bearer {{ r_keycloak_token.json.access_token }}"
        validate_certs: false
      register: r_existing_client

    - name: Create OpenShift OAuth client
      when: r_existing_client.json | length == 0
      ansible.builtin.uri:
        url: "{{ _keycloak_url }}/admin/realms/{{ ocp4_workload_trusted_software_factory_keycloak_realm }}/clients"
        method: POST
        headers:
          Authorization: "Bearer {{ r_keycloak_token.json.access_token }}"
          Content-Type: application/json
        body_format: json
        body:
          clientId: openshift
          name: OpenShift
          enabled: true
          protocol: openid-connect
          publicClient: false
          redirectUris:
            - "{{ _oauth_redirect_url }}"
          webOrigins:
            - "{{ _oauth_web_origin }}"
          standardFlowEnabled: true
          implicitFlowEnabled: false
          directAccessGrantsEnabled: true
          serviceAccountsEnabled: false
        validate_certs: false
        status_code: 201
      register: r_client_created

    - name: Get OpenShift client details
      ansible.builtin.uri:
        url: "{{ _keycloak_url }}/admin/realms/{{ ocp4_workload_trusted_software_factory_keycloak_realm }}/clients?clientId=openshift"
        method: GET
        headers:
          Authorization: "Bearer {{ r_keycloak_token.json.access_token }}"
        validate_certs: false
      register: r_openshift_client

    - name: Get client secret
      ansible.builtin.uri:
        url: "{{ _keycloak_url }}/admin/realms/{{ ocp4_workload_trusted_software_factory_keycloak_realm }}/clients/{{ r_openshift_client.json[0].id }}/client-secret"
        method: GET
        headers:
          Authorization: "Bearer {{ r_keycloak_token.json.access_token }}"
        validate_certs: false
      register: r_client_secret

    - name: Create client secret for OpenShift OAuth
      kubernetes.core.k8s:
        state: present
        template: keycloak-client-secret.yml.j2

    - name: Configure OpenShift OAuth
      kubernetes.core.k8s:
        state: present
        template: oauth.yml.j2

- name: Grant cluster-admin to Keycloak admin user
  kubernetes.core.k8s:
    state: present
    template: keycloak-admin-clusterrolebinding.yml.j2

- name: Wait for OAuth pods to restart
  when: r_tsf_realm.status == 200
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: openshift-authentication
    label_selectors:
      - app=oauth-openshift
  register: r_oauth_pods
  retries: 30
  delay: 10
  until:
    - r_oauth_pods.resources | length > 0
    - r_oauth_pods.resources | selectattr('status.phase', 'equalto', 'Running') | list | length > 0

- name: Remove kubeadmin user
  when: ocp4_workload_trusted_software_factory_remove_kubeadmin | bool
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Secret
    name: kubeadmin
    namespace: kube-system
